<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Deep forest green circle — matches RA logo brand identity -->
  <circle cx="256" cy="256" r="256" fill="#1a5e32"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#236b3c" stroke-width="5"/>

  <!-- Leaf accents top-right — wellness brand marker -->
  <ellipse cx="368" cy="144" rx="36" ry="16"
    fill="#2e8a4a" opacity="0.85"
    transform="rotate(-45 368 144)"/>
  <ellipse cx="390" cy="122" rx="26" ry="11"
    fill="#3aaa5c" opacity="0.60"
    transform="rotate(-45 390 122)"/>

  <!-- RA monogram — white, bold, serif -->
  <text
    x="256" y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="182"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-4"
  >RA</text>

  <!-- Saffron underline — brand accent colour -->
  <rect x="152" y="318" width="208" height="9" rx="4.5" fill="#e07228" opacity="0.92"/>
</svg>
