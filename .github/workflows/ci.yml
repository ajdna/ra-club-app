name: CI

# Smoke gate: type-check + lint + production build on every push and PR to main.
# Vercel deploys main on its own; this is the source-of-truth check that the
# code compiles and builds before it ships.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Public placeholders so `next build` never fails on missing env.
          # Real values live in Vercel; these are not secrets.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  # Browser tests for the public (no-login) screens. Runs only after `verify`
  # passes. Logged-in tests live in e2e/authed.spec.ts and run locally with a
  # test account; add TEST_EMAIL / TEST_PASSWORD as repo secrets to run them here.
  e2e:
    runs-on: ubuntu-latest
    needs: verify
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run public browser tests
        run: npx playwright test e2e/public.spec.ts
